name: Publish NuGet

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  id-token: write   # REQUIRED for NuGet Trusted Publishing
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write  # enable GitHub OIDC token issuance for this job
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Pack NuGet packages
        run: |
          dotnet pack \
            -c Release \
            -o ./nupkgs \
            -p:GraphiteVersion=$VERSION \
            -p:IncludeSymbols=true \
            -p:SymbolPackageFormat=snupkg \
            -p:ContinuousIntegrationBuild=true

      - name: Upload artifacts (optional debug step)
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./nupkgs/*

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: sinnwrig
    
      - name: Push NuGet packages
        run: |
          dotnet nuget push "./nupkgs/*.nupkg" --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json --skip-duplicate

          dotnet nuget push "./nupkgs/*.snupkg" --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Get previous tag
        id: prev_tag
        run: |
          echo "tag=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

      - name: Generate release notes from git history
        id: changelog
        run: |
          if [ -z "${{ steps.prev_tag.outputs.tag }}" ]; then
            echo "CHANGELOG<<EOF" >> $GITHUB_ENV
            git log --pretty=format:"- %s (%h)" >> $GITHUB_ENV
            echo "" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "CHANGELOG<<EOF" >> $GITHUB_ENV
            git log ${{ steps.prev_tag.outputs.tag }}..HEAD --pretty=format:"- %s (%h)" >> $GITHUB_ENV
            echo "" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ env.CHANGELOG }}